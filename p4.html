<style>
    /* Import Google Fonts directly into the stylesheet component */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Rajdhani:wght@600;700&display=swap');

    /* 1. Floating Digital Hearts & Romantic Glow */
    @keyframes heartFloat {
        0% { background-position: 0 0; }
        100% { background-position: 0 -80px; }
    }

    @keyframes heartThump {
        0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        15% { transform: scale(1.02); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        30% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
    }

    .p-body-wrap { 
        min-height: 100vh; 
        background-color: #0d001a; /* Deeper midnight purple */
        /* THE EFFECT: ASCII-style digital hearts floating upward */
        background-image: radial-gradient(circle at 2px 2px, rgba(255, 0, 255, 0.1) 1px, transparent 0);
        background-size: 40px 40px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; 
        font-family: 'JetBrains Mono', monospace;
        box-sizing: border-box;
        padding: 0 20px 60px 20px;
        color: #ff00ff;
        width: 100%;
    }

    /* Moving Heart Stream Layer */
    .p-body-wrap::after {
        content: "♥";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        color: rgba(255, 0, 255, 0.05);
        font-size: 20px;
        line-height: 40px;
        letter-spacing: 20px;
        animation: heartFloat 4s linear infinite;
        pointer-events: none;
        z-index: 1;
        opacity: 0.5;
        text-shadow: 40px 80px rgba(0, 242, 255, 0.05), 80px 160px rgba(255, 0, 255, 0.05);
    }

    /* 2. The HUD Container with a "Heartbeat" animation */
    .p-container { 
        max-width: 650px; 
        width : 100%; 
        background: rgba(13, 0, 26, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 45px 30px; 
        border: 1px solid rgba(255, 0, 255, 0.4);
        border-radius: 4px;
        text-align: center;
        box-sizing: border-box;
        margin-top: 40px;
        position: relative;
        animation: heartThump 3s ease-in-out infinite;
        z-index: 20;
    }

    /* --- STYLES RE-COLORED FOR CYBER LOVE --- */
    .p-pfp { width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 30px; object-fit: cover; display: none; border: 2px solid #ff00ff; filter: drop-shadow(0 0 10px #ff00ff); }
    .p-name { font-family: 'Rajdhani', sans-serif; font-size: clamp(1.8rem, 7vw, 2.2rem); font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 5px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(255, 0, 255, 0.8); }
    .p-bio { font-size: 0.85rem; color: #fbcfe8; line-height: 1.6; margin-bottom: 35px; font-weight: 300; text-transform: uppercase; border-top: 1px solid rgba(255, 0, 255, 0.2); padding-top: 20px; }
    .p-links { display: flex; flex-direction: column; gap: 15px; }
    .p-link-btn { background: rgba(255, 0, 255, 0.05); border: 1px solid #ff00ff; color: #ff00ff; padding: 16px; text-decoration: none; font-weight: 500; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s ease; display: block; }
    .p-link-btn:hover { background: #ff00ff; color: #000; transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }
    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .p-social-icon { color: #00f2ff; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; white-space: nowrap; display: inline-block; }
    .p-social-icon::before { content: "< "; }
    .p-social-icon::after { content: " >"; }
    .p-yt { margin-top: 30px; display: none; }
    .p-yt iframe { width: 100%; aspect-ratio: 16 / 9; border: 1px solid rgba(255, 0, 255, 0.2); border-radius: 4px; }
</style>

<div class="p-body-wrap">
    <div class="p-container">
        <img class="p-pfp" src="" alt="Profile">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>
    </div>
</div>
