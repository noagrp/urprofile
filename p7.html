<style>
    /* Import High-Performance Tech Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');

    .p-body-wrap { 
        min-height: 100vh; 
        background-color: #0d0d0f;
        /* Clean technical matrix grid lines */
        background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
        background-size: 30px 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-sizing: border-box;
        padding: 40px 20px 60px 20px;
        color: #ffffff;
        width: 100%;
    }

    /* PREMIUM MONOCHROME HUD CONTAINER */
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: #141417; 
        padding: 50px 30px; 
        border: 1px solid #27272a;
        border-radius: 4px; /* Sharp technical corners */
        text-align: center;
        box-sizing: border-box;
        margin-top: 20px;
        position: relative;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    /* GAUGED AVATAR IMAGE FRAME */
    .p-pfp { 
        width: 115px; 
        height: 115px; 
        border-radius: 4px; 
        margin: 0 auto 25px; 
        object-fit: cover; 
        display: none; /* Controlled dynamically by index.html loader */
        border: 1px solid #71717a;
        filter: grayscale(100%);
    }

    /* TYPOGRAPHY SYSTEM */
    .p-name { 
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.6rem, 7vw, 2.3rem); 
        font-weight: 900; 
        color: #ffffff;
        margin: 0 0 12px 0;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-style: italic;
        text-shadow: 2px 2px 0px #27272a;
    }

    .p-bio { 
        font-size: 0.9rem; 
        color: #a1a1aa; 
        line-height: 1.6; 
        margin-bottom: 35px;
        font-weight: 400;
        word-wrap: break-word;
        border-top: 1px dashed #27272a;
        padding-top: 20px;
    }

    /* TRILINEAR ACTION LINKS */
    .p-links { 
        display: flex; 
        flex-direction: column; 
        gap: 14px; 
    }

    .p-link-btn { 
        background: #1c1c21;
        border: 1px solid #27272a;
        border-left: 4px solid #ffffff; /* Sharp white accent block */
        color: #ffffff; 
        padding: 16px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.2s ease-in-out;
        display: block;
        text-align: left;
    }

    .p-link-btn:hover { 
        background: #ffffff;
        color: #0d0d0f; 
        border-color: #ffffff;
        transform: skewX(-4deg) translateX(4px); /* Aerodynamic lean on hover */
    }

    /* MONOCHROME UTILITY BUTTONS */
    .p-socials { 
        margin-top: 40px; 
        display: flex; 
        justify-content: center; 
        gap: 10px; 
        flex-wrap: wrap;
    }

    .p-social-icon { 
        background: transparent;
        border: 1px solid #27272a;
        color: #a1a1aa;
        text-decoration: none; 
        font-size: 0.75rem; 
        font-weight: 700;
        padding: 8px 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s ease;
    }

    .p-social-icon:hover { 
        background: rgba(255, 255, 255, 0.05);
        border-color: #ffffff;
        color: #ffffff;
    }
    
    .p-social-icon::before { content: "[ "; }
    .p-social-icon::after { content: " ]"; }

    /* TELEMETRY MEDIA SCREEN HOUSING */
    .p-yt {
        margin-top: 30px;
        display: none; 
    }

    .p-yt iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid #27272a;
        filter: grayscale(100%);
        transition: filter 0.3s ease;
    }
    
    .p-yt iframe:hover {
        filter: grayscale(0%); /* Restores natural color when viewing video elements */
    }
</style>

<div class="p-body-wrap">
    <div class="p-container">
        
        <img class="p-pfp" src="" alt="Avatar Frame">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>

    </div>
</div>
