<style>
    /* Import Technical HUD Typography Sets directly into the stylesheet component */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');

    /* 1. FLUID CHROMATIC COLOR SHIFT KEYFRAMES (Guaranteed to animate) */
    @keyframes chromaGlowLoop {
        0%, 100% { 
            border-color: rgba(255, 0, 85, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), -4px -2px 30px rgba(255, 0, 85, 0.2);
            text-shadow: 2px 0 0 rgba(255, 0, 85, 0.6), -2px 0 0 rgba(0, 150, 255, 0.4);
        }
        50% { 
            border-color: rgba(0, 150, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 4px 2px 30px rgba(0, 150, 255, 0.2);
            text-shadow: -2px 0 0 rgba(255, 0, 85, 0.4), 2px 0 0 rgba(0, 150, 255, 0.6);
        }
    }

    @keyframes ambientWave {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    .p-body-wrap { 
        min-height: 100vh; 
        /* Fluid, slow-moving cyber color backdrop */
        background: linear-gradient(-45deg, #050508, #0b071a, #040914, #050508);
        background-size: 400% 400%;
        animation: ambientWave 12s ease infinite;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-sizing: border-box;
        padding: 40px 20px 60px 20px;
        color: #ffffff;
        width: 100%;
        position: relative;
        overflow-x: hidden;
    }

    /* Crisp horizontal cyber matrix overlay line lines */
    .p-body-wrap::before {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 1;
        background: linear-gradient(rgba(255, 255, 255, 0.002) 50%, rgba(0, 0, 0, 0.12) 50%);
        background-size: 100% 4px;
    }

    /* 2. RGB CHROMATIC GLASS HUD CONTAINER */
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: rgba(14, 14, 19, 0.85); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 50px 30px; 
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px; /* Clean technical cuts */
        text-align: center;
        box-sizing: border-box;
        margin-top: 20px;
        position: relative;
        z-index: 2;
        /* Triggers the color aberration glow pulse */
        animation: chromaGlowLoop 6s ease-in-out infinite;
    }

    /* Decorative Tech Label */
    .p-container::before {
        content: "SYSTEM // CHROMA_ACTIVE";
        position: absolute;
        top: -10px;
        left: 20px;
        background: #111115;
        color: #a1a1aa;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.65rem;
        font-weight: 900;
        padding: 2px 10px;
        letter-spacing: 1.5px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* 3. PROFILE INSTRUMENTS AVATAR */
    .p-pfp { 
        width: 120px; 
        height: 120px; 
        border-radius: 4px; 
        margin: 0 auto 25px; 
        object-fit: cover; 
        display: none; /* Injected dynamically by your shell loader */
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* 4. TYPOGRAPHY SYSTEM */
    .p-name { 
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.6rem, 7vw, 2.3rem); 
        font-weight: 900; 
        color: #ffffff;
        margin: 0 0 12px 0;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-style: italic;
    }

    .p-bio { 
        font-size: 0.95rem; 
        color: #d4d4d8; 
        line-height: 1.6; 
        margin-bottom: 35px;
        font-weight: 400;
        word-wrap: break-word;
        border-top: 1px dashed rgba(255, 255, 255, 0.1);
        padding-top: 20px;
    }

    /* 5. SLOW CHROMATIC HOVER LINK BUTTONS */
    .p-links { 
        display: flex; 
        flex-direction: column; 
        gap: 14px; 
    }

    .p-link-btn { 
        background: #121216;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-left: 4px solid #ffffff; 
        color: #ffffff; 
        padding: 16px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.2s ease-in-out;
        display: block;
        text-align: left;
    }

    .p-link-btn:hover { 
        background: #ffffff;
        color: #050508; 
        border-color: #ffffff;
        transform: skewX(-3deg) translateX(4px); 
        box-shadow: -4px 4px 0px rgba(0, 150, 255, 0.6), 4px -4px 0px rgba(255, 0, 85, 0.6);
    }

    /* 6. BRACKETED UTILITY SOCIAL STRIPS */
    .p-socials { 
        margin-top: 40px; 
        display: flex; 
        justify-content: center; 
        gap: 10px; 
        flex-wrap: wrap;
    }

    .p-social-icon { 
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #a1a1aa;
        text-decoration: none; 
        font-size: 0.75rem; 
        font-weight: 700;
        padding: 8px 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s ease;
    }

    .p-social-icon:hover { 
        background: rgba(255, 255, 255, 0.03);
        border-color: #ffffff;
        color: #ffffff;
    }
    
    .p-social-icon::before { content: "[ "; }
    .p-social-icon::after { content: " ]"; }

    /* 7. EMBEDDED MEDIA SCREEN HOUSING */
    .p-yt {
        margin-top: 30px;
        display: none; 
    }

    .p-yt iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
    }
</style>

<div class="p-body-wrap">
    <div class="p-container">
        
        <img class="p-pfp" src="" alt="Avatar Frame">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>

    </div>
</div>
