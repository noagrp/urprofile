<style>
    .p-body-wrap { 
        min-height: 100vh; 
        background-color: #fcfcfc; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
        padding: 40px 20px 60px 20px;
        width: 100%;
    }
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: #ffffff; 
        padding: 40px 25px; \
        border: 2px solid #000000; 
        border-radius: 4px; \
        text-align: center;
        box-shadow: 10px 10px 0px rgba(0,0,0,0.05); \
        box-sizing: border-box;
    }
    .p-pfp { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 2px solid #000000; display: none; margin: 0 auto 20px; }
    .p-name { font-size: 1.5rem; font-weight: 800; margin: 0 0 10px 0; color: #000000; text-transform: uppercase; letter-spacing: -0.5px; }
    .p-bio { font-size: 0.95rem; color: #475569; margin: 0 0 30px 0; line-height: 1.5; }
    .p-links { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
    .p-link-btn { background: #ffffff; color: #000000; border: 2px solid #000000; border-radius: 4px; padding: 14px; text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: all 0.2s ease; word-wrap: break-word; box-shadow: 4px 4px 0px #000000; }
    .p-link-btn:hover { background: #000000; color: #ffffff; transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000000; }
    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .p-social-icon { color: #000000; text-decoration: underline; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .p-yt { margin-top: 30px; display: none; border: 2px solid #000000; border-radius: 4px; overflow: hidden; }
</style>

<div class="p-body-wrap">
    <div class="p-container">
        <img class="p-pfp" src="" alt="Profile Picture">
        <h1 class="p-name"></h1>
        <p class="p-bio"></p>
        
        <div class="p-yt"></div>

        <div class="p-links"></div>

        <div class="p-socials"></div>
    </div>
</div>
