<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');

    @keyframes neonTraceLoop {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .p-body-wrap { 
        min-height: 100vh; 
        background: #f4f4f5; /* Clean light canvas */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        padding: 40px 20px 60px 20px;
        color: #18181b;
        transition: background 0.5s ease;
    }

    /* 2. THE GLOW-CONTAINER */
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: #ffffff; 
        padding: 50px 30px; 
        border-radius: 12px;
        text-align: center;
        position: relative;
        z-index: 2;
        /* Default subtle shadow */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 6px solid #e4e4e7;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* THE GLOW EFFECT (Triggered on hover or class add) */
    .p-container:hover {
        border-color: #0096ff;
        box-shadow: 0 0 40px rgba(0, 150, 255, 0.3);
        transform: translateY(-5px);
    }

    /* Top Technical Sub-Label Frame */
    .p-container::after {
        content: "LUMINOUS-HUD";
        position: absolute;
        top: -14px;
        left: 20px;
        background: #ffffff;
        color: #71717a;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.65rem;
        font-weight: 900;
        padding: 2px 10px;
        border: 1px solid #e4e4e7;
    }

    /* 3. PROFILE INSTRUMENTS */
    .p-pfp { 
        width: 120px; height: 120px; border-radius: 4px; margin: 0 auto 25px; 
        object-fit: cover; display: none; border: 1px solid #e4e4e7;
        transition: box-shadow 0.3s ease;
    }
    .p-container:hover .p-pfp { box-shadow: 0 0 20px rgba(0, 150, 255, 0.2); }

    /* 4. TYPOGRAPHY SYSTEM */
    .p-name { 
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.6rem, 7vw, 2.3rem); 
        font-weight: 900; color: #09090b;
        margin: 0 0 12px 0;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: text-shadow 0.3s ease;
    }
    .p-container:hover .p-name { text-shadow: 0 0 10px rgba(0, 150, 255, 0.5); }

    .p-bio { font-size: 0.95rem; color: #52525b; margin-bottom: 35px; border-top: 1px dashed #e4e4e7; padding-top: 20px; }

    /* 5. HOVER ACTION BUTTONS */
    .p-links { display: flex; flex-direction: column; gap: 14px; }
    .p-link-btn { 
        background: #fafafa;
        border: 1px solid #e4e4e7;
        border-left: 4px solid #18181b; 
        color: #18181b; 
        padding: 16px; 
        font-weight: 700; 
        text-transform: uppercase;
        transition: all 0.3s ease;
    }
    .p-link-btn:hover { 
        background: #0096ff;
        color: #ffffff; 
        border-color: #0096ff;
        box-shadow: 0 0 20px rgba(0, 150, 255, 0.4);
    }

    /* 6. SOCIAL TILES */
    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 10px; }
    .p-social-icon { 
        border: 1px solid #d4d4d8;
        color: #71717a;
        padding: 8px 16px;
        transition: all 0.3s ease;
    }
    .p-social-icon:hover { 
        background: #0096ff; 
        border-color: #0096ff; 
        color: #ffffff;
        box-shadow: 0 0 15px rgba(0, 150, 255, 0.4);
    }
</style>
