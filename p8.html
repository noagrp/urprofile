<style>
    /* 1. Body & Atmosphere */
    .p-body-wrap { 
        min-height: 100vh; 
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 40px 20px; width: 100%; position: relative; overflow: hidden;
    }

    /* Weather Effects */
    .p-body-wrap::before, .p-body-wrap::after { pointer-events: none; content: ""; position: absolute; }
    .p-body-wrap::before { top: -20%; left: -20%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,0,0.2) 0%, transparent 70%); animation: sunPulse 8s infinite ease-in-out; }
    .p-body-wrap::after { top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(0deg, transparent 90%, rgba(255,255,255,0.1) 100%); background-size: 10px 10px; animation: rainDrop 1s linear infinite; }

    /* 2. Container (Glassmorphism) */
    .p-container { 
        max-width: 650px; width: 100%; background: rgba(255, 255, 255, 0.1); 
        backdrop-filter: blur(15px); padding: 40px 25px; border: 1px solid rgba(255, 255, 255, 0.2); 
        border-radius: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 1;
    }

    /* 3. Elements */
    .p-pfp { width: 96px; height: 96px; border-radius: 50%; border: 2px solid #ffffff; margin: 0 auto 20px; display: block; object-fit: cover; }
    .p-name { color: #ffffff; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; margin: 0 0 10px 0; }
    .p-bio { color: #d1d1d1; font-size: 0.95rem; margin: 0 0 30px 0; }
    .p-links { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
    
    .p-link-btn { 
        background: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.3); 
        border-radius: 12px; padding: 14px; text-decoration: none; font-weight: 700; text-transform: uppercase; 
        font-size: 0.8rem; transition: all 0.3s ease; display: block;
    }
    .p-link-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.02); }

    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
    .p-social-icon { color: #ffffff; text-decoration: underline; font-size: 0.75rem; font-weight: 700; }
    .p-yt { margin-top: 30px; display: block; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; overflow: hidden; }

    /* 4. Animations */
    @keyframes sunPulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }
    @keyframes rainDrop { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
</style>
