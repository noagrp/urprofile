<div class="p-body-wrap">
    <div class="p-container">
        <img class="p-pfp" src="" alt="Profile">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>
    </div>
</div>

<style>
    /* 1. Environment: Linear gradient with atmospheric overlay */
    .p-body-wrap { 
        min-height: 100vh; 
        background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
    }

    /* Sunshine Pulse Effect */
    .p-body-wrap::before {
        content: "";
        position: absolute;
        top: -20%;
        left: -20%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
        animation: sunPulse 8s infinite ease-in-out;
        pointer-events: none;
    }

    /* Raindrop Overlay */
    .p-body-wrap::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(0deg, transparent 90%, rgba(255,255,255,0.15) 100%);
        background-size: 15px 15px;
        animation: rainFall 0.8s linear infinite;
        pointer-events: none;
    }

    /* 2. Glass Container */
    .p-container { 
        position: relative;
        z-index: 1;
        max-width: 650px; 
        width: 100%; 
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        padding: 45px 30px; 
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 35px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    /* 3. Image Shell */
    .p-pfp { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 25px; object-fit: cover; border: 4px solid rgba(255, 255, 255, 0.3); }

    /* 4. Text Shells */
    .p-name { font-size: 2rem; color: #ffffff; margin: 0 0 8px 0; }
    .p-bio { color: rgba(255, 255, 255, 0.9); margin-bottom: 35px; }

    /* 5. Button Shells */
    .p-links { display: flex; flex-direction: column; gap: 12px; }
    .p-link-btn { 
        background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff; padding: 16px; border-radius: 18px; display: block;
    }

    /* 6. Social Shells */
    .p-socials { margin-top: 35px; display: flex; justify-content: center; gap: 8px; }
    .p-social-icon { background: rgba(255, 255, 255, 0.1); padding: 10px 18px; border-radius: 50px; color: #ffffff; text-decoration: none; }

    /* 7. Video Shell */
    .p-yt { margin-top: 30px; }
    .p-yt iframe { width: 100%; aspect-ratio: 16 / 9; border-radius: 20px; }

    /* Animations */
    @keyframes sunPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
    @keyframes rainFall { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
</style>
