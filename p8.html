<style>
    .p-body-wrap { 
        min-height: 100vh; 
        background: linear-gradient(135deg, #87CEEB 0%, #E0F7FA 50%, #4682B4 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
        padding: 40px 20px 60px 20px;
        width: 100%;
        position: relative;
        overflow: hidden;
    }
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: rgba(255, 255, 255, 0.95); 
        padding: 40px 25px; 
        border: 2px solid #000000; 
        border-radius: 4px; 
        text-align: center;
        box-shadow: 10px 10px 0px rgba(0,0,0,0.1); 
        box-sizing: border-box;
        position: relative;
        z-index: 10;
    }
    .p-pfp { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 2px solid #000000; display: none; margin: 0 auto 20px; }
    .p-name { font-size: 1.5rem; font-weight: 800; margin: 0 0 10px 0; color: #1E3A8A; text-transform: uppercase; letter-spacing: -0.5px; }
    .p-bio { font-size: 0.95rem; color: #334155; margin: 0 0 30px 0; line-height: 1.5; }
    .p-links { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
    .p-link-btn { 
        background: #ffffff; 
        color: #1E40AF; 
        border: 2px solid #1E40AF; 
        border-radius: 4px; 
        padding: 14px; 
        text-decoration: none; 
        font-weight: 700; 
        text-transform: uppercase; 
        font-size: 0.8rem; 
        letter-spacing: 1px; 
        transition: all 0.2s ease; 
        word-wrap: break-word; 
        box-shadow: 4px 4px 0px #1E40AF; 
    }
    .p-link-btn:hover { 
        background: #1E40AF; 
        color: #ffffff; 
        transform: translate(-2px, -2px); 
        box-shadow: 6px 6px 0px #1E40AF; 
    }
    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .p-social-icon { color: #1E40AF; text-decoration: underline; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .p-yt { margin-top: 30px; display: none; border: 2px solid #1E40AF; border-radius: 4px; overflow: hidden; }

    /* Weather Effects */
    .sun { 
        position: absolute; 
        top: 60px; 
        left: 60px; 
        width: 80px; 
        height: 80px; 
        background: radial-gradient(circle, #FFEB3B 30%, #FBC02D 70%); 
        border-radius: 50%; 
        box-shadow: 0 0 60px #FFEB3B, 0 0 120px rgba(255, 193, 7, 0.6); 
        z-index: 5;
        opacity: 0;
        transition: opacity 1s ease;
        display: none;
    }
    .sun-ray {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(255, 235, 59, 0.25) 0%, transparent 60%);
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        transition: opacity 2s ease;
    }
    .rain {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 6;
        overflow: hidden;
    }
    .drop {
        position: absolute;
        width: 2px;
        height: 50px;
        background: linear-gradient(transparent, #81D4FA);
        animation: fall linear infinite;
        opacity: 0.7;
    }
    @keyframes fall {
        to {
            transform: translateY(100vh);
        }
    }
    .cloud {
        position: absolute;
        background: #fff;
        border-radius: 50px;
        opacity: 0.9;
        z-index: 3;
    }
</style>

<div class="p-body-wrap">
    <div class="sun" id="sun"></div>
    <div class="sun-ray" id="sunRay"></div>
    <div class="rain" id="rain"></div>
    
    <!-- Decorative clouds -->
    <div class="cloud" style="top: 80px; left: 20%; width: 120px; height: 40px; box-shadow: 30px 20px 0 #fff, -30px 10px 0 #fff;"></div>
    <div class="cloud" style="top: 140px; left: 60%; width: 90px; height: 35px; box-shadow: 25px 15px 0 #fff, -25px 10px 0 #fff;"></div>

    <div class="p-container">
        <img class="p-pfp" src="" alt="Profile Picture">
        <h1 class="p-name"></h1>
        <p class="p-bio"></p>
        
        <div class="p-yt"></div>

        <div class="p-links"></div>

        <div class="p-socials"></div>
    </div>
</div>

<script>
    // Weather Animation Controller
    let isRaining = false;

    function createRainDrop() {
        const rain = document.getElementById('rain');
        const drop = document.createElement('div');
        drop.className = 'drop';
        
        const leftPos = Math.random() * 100;
        const duration = Math.random() * 0.6 + 0.4;
        const delay = Math.random() * 1.5;
        
        drop.style.left = `${leftPos}vw`;
        drop.style.animationDuration = `${duration}s`;
        drop.style.animationDelay = `-${delay}s`;
        drop.style.height = `${Math.random() * 40 + 30}px`;
        drop.style.opacity = Math.random() * 0.6 + 0.4;
        
        rain.appendChild(drop);
        
        setTimeout(() => {
            if (drop.parentNode) drop.parentNode.removeChild(drop);
        }, duration * 1000 + 1000);
    }

    function startRain() {
        if (isRaining) return;
        isRaining = true;
        const rainInterval = setInterval(() => {
            if (!isRaining) {
                clearInterval(rainInterval);
                return;
            }
            for (let i = 0; i < 3; i++) {
                createRainDrop();
            }
        }, 60);
    }

    function stopRain() {
        isRaining = false;
    }

    function showSun() {
        const sun = document.getElementById('sun');
        const sunRay = document.getElementById('sunRay');
        
        sun.style.display = 'block';
        sun.style.opacity = '1';
        sunRay.style.opacity = '1';
        
        setTimeout(() => {
            sun.style.opacity = '0';
            sunRay.style.opacity = '0';
            setTimeout(() => {
                if (!isRaining) sun.style.display = 'none';
            }, 1500);
        }, 6000);
    }

    function weatherCycle() {
        showSun();
        setTimeout(() => {
            startRain();
            setTimeout(() => {
                stopRain();
                setTimeout(() => weatherCycle(), 1500);
            }, 8000);
        }, 8000);
    }

    window.addEventListener('load', () => {
        setTimeout(() => weatherCycle(), 1000);
        
        setInterval(() => {
            if (Math.random() > 0.7 && isRaining) {
                for (let i = 0; i < 5; i++) createRainDrop();
            }
        }, 800);
    });
</script>
