<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');

    @keyframes neonTraceLoop {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes ambientWave {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    .p-body-wrap { 
        min-height: 100vh; 
        /* Light Gradient Base */
        background: linear-gradient(-45deg, #f4f4f5, #e4e4e7, #fafafa, #f4f4f5);
        background-size: 400% 400%;
        animation: ambientWave 12s ease infinite;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-sizing: border-box;
        padding: 40px 20px 60px 20px;
        color: #18181b;
        width: 100%;
        position: relative;
        overflow-x: hidden;
    }

    /* Crisp matrix scanlines - inverted opacity */
    .p-body-wrap::before {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 1;
        background: linear-gradient(rgba(0, 0, 0, 0.005) 50%, rgba(255, 255, 255, 0.1) 50%);
        background-size: 100% 4px;
    }

    /* 2. WHITE LIGHT BOX CONTAINER */
    .p-container { 
        max-width: 650px; 
        width: 100%; 
        background: #ffffff; 
        padding: 50px 30px; 
        border-radius: 12px;
        text-align: center;
        box-sizing: border-box;
        margin-top: 20px;
        position: relative;
        z-index: 2;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
        
        border: 6px solid transparent;
        background-image: linear-gradient(#ffffff, #ffffff), 
                          linear-gradient(90deg, #d4d4d8, #a1a1aa, #d4d4d8, #e4e4e7, #d4d4d8);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        background-size: 100% 100%, 200% 200%;
        animation: neonTraceLoop 5s linear infinite;
    }

    /* Top Technical Sub-Label Frame */
    .p-container::after {
        content: "LIGHT-HUD";
        position: absolute;
        top: -14px;
        left: 20px;
        background: #ffffff;
        color: #71717a;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.65rem;
        font-weight: 900;
        padding: 2px 10px;
        letter-spacing: 1.5px;
        border: 1px solid #e4e4e7;
    }

    /* 3. PROFILE INSTRUMENTS */
    .p-pfp { 
        width: 120px; height: 120px; border-radius: 4px; margin: 0 auto 25px; 
        object-fit: cover; display: none; border: 1px solid #e4e4e7;
    }

    /* 4. TYPOGRAPHY SYSTEM */
    .p-name { 
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.6rem, 7vw, 2.3rem); 
        font-weight: 900; 
        color: #09090b;
        margin: 0 0 12px 0;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-style: italic;
    }

    .p-bio { 
        font-size: 0.95rem; 
        color: #52525b; 
        line-height: 1.6; 
        margin-bottom: 35px;
        border-top: 1px dashed #e4e4e7;
        padding-top: 20px;
    }

    /* 5. HOVER ACTION BUTTON LINKS */
    .p-links { display: flex; flex-direction: column; gap: 14px; }
    .p-link-btn { 
        background: #fafafa;
        border: 1px solid #e4e4e7;
        border-left: 4px solid #18181b; 
        color: #18181b; 
        padding: 16px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.2s ease-in-out;
        display: block;
        text-align: left;
    }

    .p-link-btn:hover { 
        background: #18181b;
        color: #ffffff; 
        border-color: #18181b;
        transform: skewX(-3deg) translateX(4px); 
        box-shadow: -4px 4px 0px rgba(0, 0, 0, 0.2);
    }

    /* 6. SOCIAL TILES */
    .p-socials { margin-top: 40px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .p-social-icon { 
        background: transparent;
        border: 1px solid #d4d4d8;
        color: #71717a;
        text-decoration: none; 
        font-size: 0.75rem; 
        font-weight: 700;
        padding: 8px 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s ease;
    }
    .p-social-icon:hover { background: #f4f4f5; border-color: #18181b; color: #18181b; }
    .p-social-icon::before { content: "[ "; }
    .p-social-icon::after { content: " ]"; }

    /* 7. DOCK MEDIA AREA */
    .p-yt { margin-top: 30px; display: none; }
    .p-yt iframe { width: 100%; aspect-ratio: 16 / 9; border: 1px solid #e4e4e7; border-radius: 4px; }
</style>

<div class="p-body-wrap">
    <div class="p-container">
        <img class="p-pfp" src="" alt="Avatar Frame">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>
    </div>
</div>
