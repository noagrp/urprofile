<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* Import Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

    /* 1. WEATHER ENVIRONMENT */
    .p-body-wrap { 
        min-height: 100vh; 
        background: linear-gradient(180deg, #2c3e50 0%, #00d2ff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        font-family: 'Plus Jakarta Sans', sans-serif;
        padding: 40px 20px;
        color: #ffffff;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    /* Sun Ray Shine Effect */
    .p-body-wrap::before {
        content: "";
        position: absolute;
        top: -20%;
        left: -20%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
        animation: sunPulse 8s infinite ease-in-out;
        pointer-events: none;
        z-index: 0;
    }

    /* Rain Drop Effect */
    .p-body-wrap::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(0deg, transparent 90%, rgba(255,255,255,0.15) 100%);
        background-size: 15px 15px;
        animation: rainFall 0.8s linear infinite;
        pointer-events: none;
        z-index: 0;
    }

    /* 2. GLASS HUD */
    .p-container { 
        position: relative;
        z-index: 1;
        max-width: 650px; 
        width: 100%; 
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 45px 30px; 
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 35px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        box-sizing: border-box;
    }

    /* 3. PROFILE IMAGE */
    .p-pfp { 
        width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 25px; 
        object-fit: cover; display: none; border: 4px solid rgba(255, 255, 255, 0.3);
    }

    /* 4. TYPOGRAPHY */
    .p-name { font-family: 'Outfit', sans-serif; font-size: clamp(1.8rem, 8vw, 2.2rem); font-weight: 800; color: #ffffff; margin: 0 0 8px 0; }
    .p-bio { font-size: 0.95rem; color: rgba(255, 255, 255, 0.9); margin-bottom: 35px; }

    /* 5. BUTTONS */
    .p-links { display: flex; flex-direction: column; gap: 12px; }
    .p-link-btn { 
        background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff; padding: 16px; text-decoration: none; font-weight: 700; 
        border-radius: 18px; transition: all 0.3s ease; display: block;
    }
    .p-link-btn:hover { background: #ffffff; color: #000000; transform: scale(1.03); }

    /* 6. SOCIALS */
    .p-socials { margin-top: 35px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .p-social-icon { 
        background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff; text-decoration: none; font-size: 0.75rem; font-weight: 700;
        padding: 10px 18px; border-radius: 50px; text-transform: uppercase;
    }
    .p-social-icon:hover { background: rgba(255, 255, 255, 1); color: #000000; }

    /* 7. VIDEO */
    .p-yt { margin-top: 30px; display: none; }
    .p-yt iframe { width: 100%; aspect-ratio: 16 / 9; border-radius: 20px; border: none; }

    /* ANIMATIONS */
    @keyframes sunPulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
    @keyframes rainFall { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
</style>
</head>
<body>

<div class="p-body-wrap">
    <div class="p-container">
        <img class="p-pfp" src="" alt="Profile">
        <h1 class="p-name"></h1>
        <div class="p-bio"></div>
        <div class="p-links"></div>
        <div class="p-yt"></div>
        <div class="p-socials"></div>
    </div>
</div>

</body>
</html>
